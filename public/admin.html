<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务员后台 · 二维码与溯源</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;margin:0;background:#f5f7fa;color:#1f2937}
  .wrap{max-width:960px;margin:0 auto;padding:24px 18px}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:#6b7280;font-size:13px;margin-bottom:18px}
  .card{background:#fff;border-radius:12px;padding:18px 20px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:18px}
  .card h3{margin:0 0 14px;font-size:16px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  input{padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;flex:1;min-width:180px}
  button{padding:10px 18px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:14px;cursor:pointer}
  button.alt{background:#059669}
  .sales-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:8px}
  .sales-item{border:1px solid #e5e7eb;border-radius:10px;padding:14px;text-align:center}
  .sales-item .nm{font-weight:700;margin-bottom:8px}
  .sales-item img{width:160px;height:160px;border:1px solid #eee;border-radius:8px}
  .sales-item .lk{font-size:12px;color:#2563eb;word-break:break-all;display:block;margin:8px 0;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  th,td{padding:8px 10px;border-bottom:1px solid #eee;text-align:left}
  th{background:#f9fafb;color:#374151}
  .stat{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px}
  .stat .b{background:#eff6ff;border-radius:10px;padding:10px 16px;text-align:center}
  .stat .b .n{font-size:22px;font-weight:800;color:#2563eb}
  .stat .b .t{font-size:12px;color:#6b7280}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:12px}
  .pill.no{background:#fee2e2;color:#b91c1c}
  .pill.yes{background:#dcfce7;color:#15803d}
  .link{color:#2563eb;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <h1>业务员后台</h1>
  <div class="sub">生成专属二维码 · 查看每位业务员带来的患者与核销情况</div>

  <div class="card">
    <h3>① 新增业务员并生成二维码</h3>
    <div class="row">
      <input id="salesName" placeholder="输入业务员姓名，如：张医生 / 渠道王">
      <button id="addBtn">生成专属二维码</button>
    </div>
    <div id="addResult" style="margin-top:12px"></div>
  </div>

  <div class="card">
    <h3>② 业务员与二维码</h3>
    <div class="sales-grid" id="salesGrid"></div>
  </div>

  <div class="card">
    <h3>③ 溯源报表（按业务员统计）</h3>
    <div class="stat" id="overall"></div>
    <table id="report">
      <thead><tr><th>业务员</th><th>推广码</th><th>带来患者</th><th>发放券</th><th>已核销</th><th>核销率</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h3>④ 领取明细</h3>
    <table id="detail">
      <thead><tr><th>核销码</th><th>患者(OpenID)</th><th>来源业务员</th><th>金额</th><th>领取时间</th><th>状态</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const fmt = t => new Date(t).toLocaleString('zh-CN');

function copy(text){
  navigator.clipboard.writeText(text).then(()=>alert('已复制链接'));
}

$('#addBtn').onclick = () => {
  const name = $('#salesName').value.trim();
  if (!name) return alert('请填写业务员姓名');
  fetch('/api/sales', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ name }) })
    .then(r => r.json())
    .then(s => {
      const url = location.origin + '/claim?code=' + s.code;
      $('#addResult').innerHTML = `<div class="sales-item" style="max-width:240px;margin:0 auto">
        <div class="nm">${s.name}</div>
        <img src="/api/qrcode?code=${s.code}">
        <span class="lk" onclick="copy('${url}')">${url}（点击复制）</span>
        <div class="tip" style="font-size:12px;color:#6b7280">推广码：${s.code}</div>
      </div>`;
      loadAll();
    });
};

async function loadAll(){
  const [sales, claims] = await Promise.all([
    fetch('/api/sales').then(r=>r.json()),
    fetch('/api/claims').then(r=>r.json())
  ]);

  // 业务员卡片
  $('#salesGrid').innerHTML = sales.map(s => {
    const url = location.origin + '/claim?code=' + s.code;
    return `<div class="sales-item">
      <div class="nm">${s.name}</div>
      <img src="/api/qrcode?code=${s.code}">
      <span class="lk" onclick="copy('${url}')">复制领取链接</span>
      <div style="font-size:11px;color:#9ca3af">${s.code}</div>
    </div>`;
  }).join('') || '<div style="color:#9ca3af">暂无业务员，先在上方添加</div>';

  // 溯源报表
  const map = {};
  sales.forEach(s => map[s.code] = { name:s.name, code:s.code, patients:new Set(), vouchers:0, redeemed:0 });
  claims.forEach(c => {
    const m = map[c.sales_code]; if (!m) return;
    m.patients.add(c.openid); m.vouchers++; if (c.redeemed) m.redeemed++;
  });
  const rows = Object.values(map).map(m => {
    const rate = m.vouchers ? Math.round(m.redeemed / m.vouchers * 100) + '%' : '0%';
    return `<tr><td>${m.name}</td><td>${m.code}</td><td>${m.patients.size}</td><td>${m.vouchers}</td><td>${m.redeemed}</td><td>${rate}</td></tr>`;
  }).join('');
  $('#report tbody').innerHTML = rows || '<tr><td colspan="6" style="color:#9ca3af">暂无数据</td></tr>';

  // 总览
  const totalP = new Set(claims.map(c=>c.openid)).size;
  const totalV = claims.length;
  const totalR = claims.filter(c=>c.redeemed).length;
  $('#overall').innerHTML = `
    <div class="b"><div class="n">${sales.length}</div><div class="t">业务员数</div></div>
    <div class="b"><div class="n">${totalP}</div><div class="t">患者总数</div></div>
    <div class="b"><div class="n">${totalV}</div><div class="t">发放券数</div></div>
    <div class="b"><div class="n">${totalR}</div><div class="t">已核销</div></div>`;

  // 明细
  $('#detail tbody').innerHTML = claims.slice().reverse().map(c => `
    <tr>
      <td><b>${c.voucher}</b></td>
      <td style="font-size:11px">${c.openid.slice(0,16)}…</td>
      <td>${c.sales_name}</td>
      <td>¥${c.amount}</td>
      <td style="font-size:12px">${fmt(c.claimed_at)}</td>
      <td>${c.redeemed ? `<span class="pill yes">已核销</span>` : `<span class="pill no">未核销</span>`}</td>
    </tr>`).join('') || '<tr><td colspan="6" style="color:#9ca3af">暂无领取记录</td></tr>';
}

loadAll();
</script>
</body>
</html>
