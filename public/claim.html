<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>领取代金券</title>
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;margin:0;background:linear-gradient(160deg,#eef2ff,#f5f7fa);min-height:100vh;color:#1f2937;display:flex;flex-direction:column;align-items:center}
  .box{width:100%;max-width:420px;margin-top:48px;background:#fff;border-radius:18px;padding:28px 24px;box-shadow:0 8px 30px rgba(37,99,235,.12);text-align:center}
  .hello{font-size:14px;color:#6b7280;margin-bottom:4px}
  .sales{font-size:22px;font-weight:700;color:#2563eb;margin-bottom:18px}
  .voucher{display:none;margin-top:18px;padding:18px;border:2px dashed #059669;border-radius:12px;background:#ecfdf5}
  .voucher .amt{font-size:34px;font-weight:800;color:#059669}
  .voucher .code{font-size:20px;letter-spacing:2px;font-weight:700;margin-top:6px}
  .btn{width:100%;padding:15px;border:none;border-radius:12px;background:#2563eb;color:#fff;font-size:17px;font-weight:600;margin-top:18px;cursor:pointer}
  .btn:disabled{background:#94a3b8}
  .msg{font-size:14px;color:#6b7280;margin-top:14px;min-height:20px}
  .err{color:#dc2626}
</style>
</head>
<body>
  <div class="box">
    <div class="hello">您正在通过以下业务员的专属二维码进入</div>
    <div class="sales" id="salesName">加载中…</div>

    <button class="btn" id="claimBtn">立即领取 ¥50 代金券</button>
    <div class="msg" id="msg"></div>

    <div class="voucher" id="voucherBox">
      <div>恭喜，领取成功！到店出示此核销码</div>
      <div class="amt">¥50</div>
      <div class="code" id="vcode"></div>
      <div style="font-size:12px;color:#6b7280;margin-top:6px">每个微信账号限领一张</div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const code = params.get('code') || '';
  const msg = document.getElementById('msg');
  const btn = document.getElementById('claimBtn');

  if (!code) {
    document.getElementById('salesName').textContent = '链接无效';
    btn.disabled = true; msg.textContent = '缺少业务员参数'; msg.className = 'msg err';
  } else {
    fetch('/api/sales-info?code=' + encodeURIComponent(code))
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => { document.getElementById('salesName').textContent = d.name + ' 的专属福利'; })
      .catch(() => { document.getElementById('salesName').textContent = '二维码无效'; btn.disabled = true; msg.textContent = '该业务员二维码不存在'; msg.className = 'msg err'; });
  }

  btn.onclick = () => {
    btn.disabled = true; msg.textContent = '领取中…';
    fetch('/api/claim', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    })
    .then(r => r.json().then(d => ({ ok: r.ok, d })))
    .then(({ ok, d }) => {
      if (!ok) { msg.textContent = d.error || '领取失败'; msg.className = 'msg err'; btn.disabled = false; return; }
      document.getElementById('voucherBox').style.display = 'block';
      document.getElementById('vcode').textContent = d.voucher;
      msg.textContent = d.dup ? '您已领取过，这是您之前的券' : '领取成功！';
      btn.textContent = '已领取';
    })
    .catch(() => { msg.textContent = '网络错误，请重试'; msg.className = 'msg err'; btn.disabled = false; });
  };
</script>
</body>
</html>
